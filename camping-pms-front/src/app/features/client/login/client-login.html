<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>🏕️ Mon Espace Client</mat-card-title>
      <mat-card-subtitle>Connectez-vous pour gérer vos réservations</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="username">
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password">
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error) {
          <p class="error-message">{{ error }}</p>
        }

        <button mat-raised-button color="primary" type="submit"
                class="full-width submit-btn" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Se connecter
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="register-link">
        Pas encore de compte ?
        <a routerLink="/register">Créer mon espace client</a>
      </p>
      <p class="staff-link">
        Personnel camping ?
        <a routerLink="/login">Accès staff →</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
