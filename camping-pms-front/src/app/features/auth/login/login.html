<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-section">
        <span class="logo-icon">🏕️</span>
        <div>
          <mat-card-title>Camping PMS</mat-card-title>
          <mat-card-subtitle>Espace personnel — Accès staff</mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="username">
          <mat-icon matSuffix>badge</mat-icon>
          @if (form.get('username')?.hasError('required')) {
            <mat-error>Email obligatoire</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password">
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        @if (error) {
          <div class="error-box">
            <mat-icon>error</mat-icon>
            <span>{{ error }}</span>
          </div>
        }

        <button mat-raised-button color="primary" type="submit"
                class="full-width submit-btn" [disabled]="loading">
          @if (loading) {
            <mat-spinner diameter="20" />
          } @else {
            Connexion
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="client-link">
        Vous êtes client ?
        <a routerLink="/mon-espace/login">Accès espace client →</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
