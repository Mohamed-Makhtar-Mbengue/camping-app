<mat-toolbar class="public-navbar">
  <a routerLink="/" class="logo">🏕️ Camping PMS</a>

  <span class="spacer"></span>

  <nav class="nav-links">
    <a mat-button routerLink="/">
      {{ 'nav.home' | translate }}
    </a>
    <a mat-button routerLink="/hebergements">
      {{ 'nav.accommodations' | translate }}
    </a>
  </nav>

  <span class="spacer"></span>

  <div class="right-section">
    <!-- Sélecteur de langue -->
    <button mat-button [matMenuTriggerFor]="langMenu" class="lang-btn">
      {{ langService.getCurrentLanguage().flag }}
      {{ langService.getCurrentLanguage().code.toUpperCase() }}
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #langMenu="matMenu">
      @for (lang of langService.languages; track lang.code) {
        <button mat-menu-item (click)="langService.setLanguage(lang.code)">
          {{ lang.flag }} {{ lang.label }}
        </button>
      }
    </mat-menu>

    <!-- Mode sombre -->
    <button mat-icon-button (click)="themeService.toggleTheme()"
            [title]="themeService.isDarkMode() ? 'Mode clair' : 'Mode sombre'">
      <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- Boutons client -->
    <a mat-button routerLink="/mon-espace/login" class="client-btn">
      <mat-icon>person</mat-icon>
      {{ 'nav.my_space' | translate }}
    </a>
    <a mat-raised-button color="primary" routerLink="/register" class="register-btn">
      <mat-icon>person_add</mat-icon>
      {{ 'nav.register' | translate }}
    </a>
  </div>
</mat-toolbar>
